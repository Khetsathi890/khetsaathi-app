<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#2c4d28">
<link rel="manifest" href="manifest.json">
<title>KhetSaathi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --soil-dark:#22301c; --leaf-green:#3f6b3a; --leaf-green-deep:#2c4d28;
    --paper:#f4f3ea; --paper-2:#eae7d8; --mustard:#c98a1f; --sky:#e7eee1;
    --card-border:#d8d4bf; --text-main:#22301c; --text-soft:#5a6650;
    --danger:#9c3b2c; --ok:#3f6b3a; --radius:16px; --shadow:0 2px 10px rgba(34,48,28,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--paper-2);font-family:'Inter',sans-serif;color:var(--text-main);-webkit-font-smoothing:antialiased;display:flex;justify-content:center;}
  .app{width:100%;max-width:430px;min-height:100vh;background:var(--paper);position:relative;display:flex;flex-direction:column;box-shadow:0 0 40px rgba(0,0,0,0.12);overflow:hidden;}

  /* ---- Language Splash ---- */
  .lang-splash{
    position:absolute;inset:0;z-index:50;
    background:linear-gradient(160deg,var(--leaf-green-deep),var(--leaf-green) 75%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:30px;text-align:center;color:#fdfbf3;
  }
  .lang-splash.hidden{display:none;}
  .lang-mark{width:56px;height:56px;background:var(--mustard);border-radius:16px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:700;font-size:28px;color:var(--soil-dark);margin-bottom:16px;}
  .lang-brand{font-family:'Fraunces',serif;font-size:26px;font-weight:600;margin-bottom:6px;}
  .lang-prompt{font-family:'IBM Plex Mono',monospace;font-size:13px;color:#d9e4d1;margin-bottom:26px;}
  .lang-options{display:flex;flex-direction:column;gap:12px;width:100%;max-width:260px;}
  .lang-btn{
    background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.35);
    color:#fdfbf3;padding:14px;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .lang-btn:active{background:var(--mustard);color:var(--soil-dark);border-color:var(--mustard);}
  .lang-btn .sub{font-size:11.5px;font-weight:400;opacity:0.8;margin-left:4px;}

  /* ---- Header ---- */
  .app-header{background:linear-gradient(160deg,var(--leaf-green-deep),var(--leaf-green) 70%);color:#fdfbf3;padding:22px 20px 30px;border-radius:0 0 22px 22px;position:relative;overflow:hidden;}
  .app-header::after{content:"";position:absolute;right:-30px;top:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,0.06);}
  .brand-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .brand-left{display:flex;align-items:center;gap:10px;}
  .brand-mark{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--mustard);border-radius:9px;font-family:'Fraunces',serif;font-weight:700;font-size:18px;color:var(--soil-dark);}
  .brand-name{font-family:'Fraunces',serif;font-size:22px;font-weight:600;letter-spacing:0.2px;}
  .brand-tag{font-size:12.5px;color:#d9e4d1;margin-top:2px;font-family:'IBM Plex Mono',monospace;}
  .lang-toggle{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.3);color:#fdfbf3;font-size:11.5px;font-weight:600;padding:6px 10px;border-radius:9px;cursor:pointer;}
  .who-row{display:flex;gap:8px;margin-top:18px;}
  .who-chip{flex:1;text-align:center;padding:9px 4px;border-radius:11px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);font-size:12.5px;color:#eef4ea;cursor:pointer;transition:all .15s ease;}
  .who-chip.active{background:var(--mustard);color:var(--soil-dark);font-weight:600;border-color:var(--mustard);}

  /* ---- Screens ---- */
  .screen{flex:1;padding:18px 16px 100px;display:none;}
  .screen.active{display:block;}
  .section-title{font-family:'Fraunces',serif;font-size:19px;font-weight:600;margin:4px 0 12px;color:var(--soil-dark);}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--leaf-green);margin-bottom:4px;}

  .search-box{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--card-border);border-radius:12px;padding:10px 14px;margin-bottom:14px;}
  .search-box input{border:none;outline:none;flex:1;font-family:'Inter';font-size:14.5px;background:transparent;color:var(--text-main);}
  .chip-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;margin-bottom:6px;scrollbar-width:none;}
  .chip-row::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto;padding:7px 14px;border-radius:20px;background:#fff;border:1px solid var(--card-border);font-size:13px;color:var(--text-soft);cursor:pointer;white-space:nowrap;}
  .chip.active{background:var(--leaf-green);color:#fff;border-color:var(--leaf-green);}

  .plant-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .packet{background:#fff;border:1px solid var(--card-border);border-radius:var(--radius);padding:14px 12px 12px;cursor:pointer;position:relative;box-shadow:var(--shadow);transition:transform .12s ease;}
  .packet:active{transform:scale(0.97);}
  .packet-icon{width:38px;height:38px;margin-bottom:8px;}
  .packet-name-hi{font-family:'Fraunces',serif;font-weight:600;font-size:15px;color:var(--soil-dark);}
  .packet-name-en{font-size:11.5px;color:var(--text-soft);font-style:italic;margin-top:1px;}
  .packet-tag{position:absolute;top:10px;right:10px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;padding:2px 6px;border-radius:5px;background:var(--sky);color:var(--leaf-green-deep);}

  .overlay{position:absolute;inset:0;background:rgba(34,48,28,0.45);z-index:20;display:none;}
  .overlay.active{display:block;}
  .sheet{position:absolute;left:0;right:0;bottom:0;background:var(--paper);border-radius:22px 22px 0 0;max-height:82%;overflow-y:auto;padding:20px 18px 30px;transform:translateY(100%);transition:transform .25s ease;}
  .sheet.active{transform:translateY(0);}
  .sheet-handle{width:40px;height:4px;background:var(--card-border);border-radius:4px;margin:0 auto 14px;}
  .sheet-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .sheet-icon{width:46px;height:46px;flex:0 0 auto;}
  .sheet-title{font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:var(--soil-dark);}
  .sheet-sub{font-size:12.5px;color:var(--text-soft);font-style:italic;}
  .info-row{display:flex;gap:10px;margin-bottom:14px;}
  .info-pill{flex:1;background:#fff;border:1px solid var(--card-border);border-radius:12px;padding:10px;text-align:center;}
  .info-pill .label{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--text-soft);text-transform:uppercase;}
  .info-pill .val{font-size:13.5px;font-weight:600;margin-top:3px;color:var(--soil-dark);}
  .disease-item{background:#fff;border:1px solid var(--card-border);border-left:4px solid var(--danger);border-radius:10px;padding:12px;margin-bottom:10px;}
  .disease-item .d-name{font-weight:600;font-size:14px;margin-bottom:3px;}
  .disease-item .d-symptom{font-size:12.5px;color:var(--text-soft);margin-bottom:5px;}
  .disease-item .d-fix{font-size:12.5px;color:var(--leaf-green-deep);}
  .close-sheet{position:absolute;top:16px;right:16px;width:30px;height:30px;border-radius:50%;background:var(--paper-2);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--soil-dark);cursor:pointer;}

  .detect-card{background:#fff;border:1.5px dashed var(--card-border);border-radius:var(--radius);padding:26px 18px;text-align:center;margin-bottom:16px;}
  .detect-card img{max-width:100%;border-radius:12px;margin-bottom:12px;}
  .upload-btn,.primary-btn{background:var(--leaf-green);color:#fff;border:none;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter';}
  .upload-btn:active,.primary-btn:active{background:var(--leaf-green-deep);}
  .hint-text{font-size:12px;color:var(--text-soft);margin-top:10px;}
  .result-card{background:#fff;border:1px solid var(--card-border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);}
  .result-card .rc-title{font-family:'Fraunces',serif;font-size:17px;font-weight:700;color:var(--soil-dark);margin-bottom:2px;}
  .result-card .rc-sub{font-size:12px;color:var(--text-soft);margin-bottom:12px;font-style:italic;}
  .rc-block{margin-bottom:12px;}
  .rc-block .rc-label{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--leaf-green);margin-bottom:4px;}
  .rc-block .rc-text{font-size:13.5px;line-height:1.5;color:var(--text-main);}
  .confidence-bar{height:6px;background:var(--paper-2);border-radius:4px;overflow:hidden;margin-top:6px;}
  .confidence-fill{height:100%;background:var(--mustard);}
  .loading-wrap{text-align:center;padding:30px 10px;}
  .spinner{width:34px;height:34px;border:3px solid var(--paper-2);border-top-color:var(--leaf-green);border-radius:50%;margin:0 auto 14px;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{font-size:13px;color:var(--text-soft);font-family:'IBM Plex Mono',monospace;}
  .error-box{background:#fdf1ee;border:1px solid #e3b9ac;color:var(--danger);border-radius:10px;padding:12px;font-size:13px;}

  .home-hero{background:#fff;border:1px solid var(--card-border);border-radius:var(--radius);padding:18px;margin-bottom:16px;box-shadow:var(--shadow);}
  .home-hero .hh-title{font-family:'Fraunces',serif;font-size:18px;font-weight:600;margin-bottom:6px;color:var(--soil-dark);}
  .home-hero .hh-text{font-size:13.5px;color:var(--text-soft);line-height:1.55;}
  .quick-actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:16px;}
  .qa-card{flex:1;min-width:45%;background:linear-gradient(160deg,var(--leaf-green),var(--leaf-green-deep));color:#fff;border-radius:14px;padding:14px 12px;cursor:pointer;}
  .qa-card.alt{background:linear-gradient(160deg,#d59a35,var(--mustard));}
  .qa-card.alt2{background:linear-gradient(160deg,#5b7a9e,#2f4863);}
  .qa-card.alt3{background:linear-gradient(160deg,#a15a7a,#6e3450);}
  .qa-card .qa-label{font-size:13px;font-weight:600;}
  .qa-card .qa-sub{font-size:11px;opacity:0.85;margin-top:3px;}
  .stat-row{display:flex;gap:10px;margin-top:16px;}
  .stat-pill{flex:1;background:var(--sky);border-radius:12px;padding:12px;text-align:center;}
  .stat-pill .num{font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:var(--leaf-green-deep);}
  .stat-pill .lbl{font-size:10.5px;color:var(--text-soft);margin-top:2px;}

  /* ---- Learn ---- */
  .segment-row{display:flex;background:var(--paper-2);border-radius:12px;padding:4px;margin-bottom:16px;}
  .segment-btn{flex:1;text-align:center;padding:9px 4px;font-size:13px;font-weight:600;color:var(--text-soft);cursor:pointer;border-radius:9px;}
  .segment-btn.active{background:#fff;color:var(--leaf-green-deep);box-shadow:var(--shadow);}
  .article-card{background:#fff;border:1px solid var(--card-border);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;}
  .article-head{display:flex;justify-content:space-between;align-items:center;}
  .article-title{font-family:'Fraunces',serif;font-weight:600;font-size:14.5px;color:var(--soil-dark);}
  .article-arrow{color:var(--leaf-green);font-size:14px;transition:transform .2s;}
  .article-body{font-size:13px;color:var(--text-soft);line-height:1.55;margin-top:10px;display:none;}
  .article-card.open .article-body{display:block;}
  .article-card.open .article-arrow{transform:rotate(90deg);}

  .calc-box{background:#fff;border:1px solid var(--card-border);border-radius:14px;padding:16px;margin-bottom:14px;}
  .calc-title{font-family:'Fraunces',serif;font-weight:600;font-size:15px;color:var(--soil-dark);margin-bottom:10px;}
  .calc-row{display:flex;gap:8px;margin-bottom:10px;}
  .calc-input,.calc-select{flex:1;padding:10px;border-radius:10px;border:1px solid var(--card-border);font-size:13.5px;font-family:'Inter';background:var(--paper);}
  .calc-result{background:var(--sky);border-radius:10px;padding:12px;font-size:13px;color:var(--leaf-green-deep);margin-top:6px;}
  .calc-result b{font-family:'IBM Plex Mono',monospace;}
  .disclaimer{font-size:11px;color:var(--text-soft);font-style:italic;margin-top:8px;}

  /* ---- Community ---- */
  .qa-post{background:#fff;border:1px solid var(--card-border);border-radius:14px;padding:14px;margin-bottom:12px;}
  .qa-post .q-tag{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:9.5px;background:var(--sky);color:var(--leaf-green-deep);padding:2px 7px;border-radius:6px;margin-bottom:6px;}
  .qa-post .q-text{font-weight:600;font-size:14px;color:var(--soil-dark);margin-bottom:6px;}
  .qa-post .a-text{font-size:13px;color:var(--text-soft);line-height:1.5;border-left:3px solid var(--leaf-green);padding-left:10px;}
  .qa-post .q-meta{font-size:11px;color:var(--text-soft);margin-top:8px;}
  .ask-box{background:#fff;border:1px solid var(--card-border);border-radius:14px;padding:14px;margin-bottom:16px;}
  .ask-box textarea{width:100%;border:1px solid var(--card-border);border-radius:10px;padding:10px;font-family:'Inter';font-size:13.5px;resize:none;min-height:70px;background:var(--paper);margin-bottom:10px;}

  .bottom-nav{position:sticky;bottom:0;left:0;right:0;background:#fdfcf7;border-top:1px solid var(--card-border);display:flex;padding:8px 4px calc(env(safe-area-inset-bottom,0px) + 8px);z-index:10;}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;cursor:pointer;color:var(--text-soft);}
  .nav-item.active{color:var(--leaf-green-deep);}
  .nav-item svg{width:20px;height:20px;}
  .nav-item span{font-size:9.5px;font-weight:600;}
</style>
</head>
<body>
<div class="app" id="app">

  <div class="lang-splash" id="langSplash">
    <div class="lang-mark">क्ष</div>
    <div class="lang-brand">KhetSaathi</div>
    <div class="lang-prompt">भाषा चुनें / Choose your language</div>
    <div class="lang-options">
      <div class="lang-btn" onclick="setLang('hi')">हिंदी <span class="sub">(Hindi)</span></div>
      <div class="lang-btn" onclick="setLang('en')">English <span class="sub">(अंग्रेज़ी)</span></div>
    </div>
  </div>

  <div class="app-header">
    <div class="brand-row">
      <div class="brand-left">
        <div class="brand-mark">क्ष</div>
        <div>
          <div class="brand-name">KhetSaathi</div>
          <div class="brand-tag" data-t="brandTag"></div>
        </div>
      </div>
      <div class="lang-toggle" onclick="toggleLang()" id="langToggleBtn"></div>
    </div>
    <div class="who-row">
      <div class="who-chip active" data-who="farmer"><span data-t="whoFarmer"></span></div>
      <div class="who-chip" data-who="student"><span data-t="whoStudent"></span></div>
      <div class="who-chip" data-who="gardener"><span data-t="whoGardener"></span></div>
    </div>
  </div>

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="home-hero">
      <div class="hh-title" data-t="homeHeading"></div>
      <div class="hh-text" data-t="homeText"></div>
      <div class="quick-actions">
        <div class="qa-card" onclick="goTo('library')">
          <div class="qa-label" data-t="qaLibrary"></div>
          <div class="qa-sub" data-t="qaLibrarySub"></div>
        </div>
        <div class="qa-card alt" onclick="goTo('detect')">
          <div class="qa-label" data-t="qaDetect"></div>
          <div class="qa-sub" data-t="qaDetectSub"></div>
        </div>
        <div class="qa-card alt2" onclick="goTo('learn')">
          <div class="qa-label" data-t="qaLearn"></div>
          <div class="qa-sub" data-t="qaLearnSub"></div>
        </div>
        <div class="qa-card alt3" onclick="goTo('community')">
          <div class="qa-label" data-t="qaCommunity"></div>
          <div class="qa-sub" data-t="qaCommunitySub"></div>
        </div>
      </div>
    </div>
    <div class="stat-row">
      <div class="stat-pill"><div class="num">14</div><div class="lbl" data-t="statPlants"></div></div>
      <div class="stat-pill"><div class="num">4</div><div class="lbl" data-t="statCats"></div></div>
      <div class="stat-pill"><div class="num">AI</div><div class="lbl" data-t="statAI"></div></div>
    </div>
  </div>

  <!-- LIBRARY -->
  <div class="screen" id="screen-library">
    <div class="eyebrow">Plant &amp; Crop Library</div>
    <div class="section-title" data-t="libraryTitle"></div>
    <div class="search-box">
      <span>🔍</span>
      <input id="searchInput" data-t-ph="searchPlaceholder">
    </div>
    <div class="chip-row" id="chipRow"></div>
    <div class="plant-grid" id="plantGrid"></div>
  </div>

  <!-- DETECT -->
  <div class="screen" id="screen-detect">
    <div class="eyebrow">AI Disease Detector</div>
    <div class="section-title" data-t="detectTitle"></div>
    <div class="detect-card" id="detectCard">
      <div style="font-size:34px;margin-bottom:10px;">🌿📷</div>
      <div style="font-size:13.5px;color:var(--text-soft);margin-bottom:14px;" data-t="detectIntro"></div>
      <input type="file" accept="image/*" id="fileInput" style="display:none;">
      <button class="upload-btn" onclick="document.getElementById('fileInput').click()" data-t="detectBtn"></button>
      <div class="hint-text" data-t="detectHint"></div>
    </div>
    <div id="detectResultArea"></div>
  </div>

  <!-- LEARN -->
  <div class="screen" id="screen-learn">
    <div class="eyebrow">Knowledge &amp; Tools</div>
    <div class="section-title" data-t="learnTitle"></div>
    <div class="segment-row">
      <div class="segment-btn active" data-seg="articles" onclick="setLearnSeg('articles')" data-t="tabArticles"></div>
      <div class="segment-btn" data-seg="calc" onclick="setLearnSeg('calc')" data-t="tabCalculators"></div>
    </div>
    <div id="learnArticles"></div>
    <div id="learnCalc" style="display:none;"></div>
  </div>

  <!-- COMMUNITY -->
  <div class="screen" id="screen-community">
    <div class="eyebrow">Farmer Community</div>
    <div class="section-title" data-t="communityTitle"></div>
    <div class="ask-box">
      <textarea id="askInput" data-t-ph="askPlaceholder"></textarea>
      <button class="primary-btn" style="width:100%;" onclick="postQuestion()" data-t="askBtn"></button>
    </div>
    <div id="qaList"></div>
  </div>

  <div class="overlay" id="overlay" onclick="closeSheet()"></div>
  <div class="sheet" id="sheet">
    <div class="close-sheet" onclick="closeSheet()">✕</div>
    <div class="sheet-handle"></div>
    <div id="sheetContent"></div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active" data-screen="home" onclick="goTo('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11l9-7 9 7"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/></svg>
      <span data-t="navHome"></span>
    </div>
    <div class="nav-item" data-screen="library" onclick="goTo('library')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span data-t="navLibrary"></span>
    </div>
    <div class="nav-item" data-screen="detect" onclick="goTo('detect')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      <span data-t="navDetect"></span>
    </div>
    <div class="nav-item" data-screen="learn" onclick="goTo('learn')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><path d="M9 7h7M9 11h7"/></svg>
      <span data-t="navLearn"></span>

/* ---------------- Library render ---------------- */
let activeCat = 'all';
let searchTerm = '';

function renderChips(){
  const row = document.getElementById('chipRow');
  row.innerHTML = CATS.map(c=>`<div class="chip ${c.id===activeCat?'active':''}" data-cat="${c.id}">${c[lang]}</div>`).join('');
  row.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('click', ()=>{
      activeCat = chip.dataset.cat;
      renderChips();
      renderGrid();
    });
  });
}

function renderGrid(){
  const grid = document.getElementById('plantGrid');
  const filtered = PLANTS.filter(p=>{
    const matchCat = activeCat==='all' || p.cat===activeCat;
    const matchSearch = (p.hi+p.en).toLowerCase().includes(searchTerm.toLowerCase());
    return matchCat && matchSearch;
  });
  if(filtered.length===0){
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:30px 0;color:var(--text-soft);font-size:13.5px;">${t('noPlantsFound')}</div>`;
    return;
  }
  grid.innerHTML = filtered.map(p=>`
    <div class="packet" data-id="${p.id}">
      <div class="packet-tag">${CATS.find(c=>c.id===p.cat)[lang]}</div>
      <div class="packet-icon">${ICONS[p.cat]}</div>
      <div class="packet-name-hi">${p.hi}</div>
      <div class="packet-name-en">${p.en}</div>
    </div>
  `).join('');
  grid.querySelectorAll('.packet').forEach(card=>{
    card.addEventListener('click', ()=>openSheet(card.dataset.id));
  });
}

document.getElementById('searchInput').addEventListener('input', (e)=>{
  searchTerm = e.target.value;
  renderGrid();
});

function openSheet(id){
  const p = PLANTS.find(x=>x.id===id);
  const content = document.getElementById('sheetContent');
  content.innerHTML = `
    <div class="sheet-header">
      <div class="sheet-icon">${ICONS[p.cat]}</div>
      <div><div class="sheet-title">${p.hi}</div><div class="sheet-sub">${p.en}</div></div>
    </div>
    <div class="info-row">
      <div class="info-pill"><div class="label">${t('sheetSeason')}</div><div class="val">${p.season[lang]}</div></div>
      <div class="info-pill"><div class="label">${t('sheetWater')}</div><div class="val">${p.water[lang]}</div></div>
      <div class="info-pill"><div class="label">${t('sheetSoil')}</div><div class="val">${p.soil[lang]}</div></div>
    </div>
    <div class="eyebrow" style="margin-top:6px;">${t('sheetIssues')}</div>
    ${p.diseases.map(d=>`
      <div class="disease-item">
        <div class="d-name">${d[lang].name}</div>
        <div class="d-symptom">${t('symptomLabel')}: ${d[lang].symptom}</div>
        <div class="d-fix">${t('fixLabel')}: ${d[lang].fix}</div>
      </div>
    `).join('')}
  `;
  document.getElementById('overlay').classList.add('active');
  document.getElementById('sheet').classList.add('active');
}
function closeSheet(){
  document.getElementById('overlay').classList.remove('active');
  document.getElementById('sheet').classList.remove('active');
}

/* ---------------- Learn: Calculators ---------------- */
const CALC_DATA = {
  wheat:{urea:55,dap:35,mop:15,waterPerAcre:180000,yieldPerAcre:18},
  rice:{urea:65,dap:30,mop:20,waterPerAcre:350000,yieldPerAcre:22},
  maize:{urea:60,dap:32,mop:16,waterPerAcre:150000,yieldPerAcre:20},
  cotton:{urea:50,dap:25,mop:20,waterPerAcre:160000,yieldPerAcre:8},
  sugarcane:{urea:100,dap:50,mop:40,waterPerAcre:400000,yieldPerAcre:320},
  tomato:{urea:45,dap:40,mop:25,waterPerAcre:170000,yieldPerAcre:80},
  potato:{urea:60,dap:40,mop:30,waterPerAcre:150000,yieldPerAcre:70},
  onion:{urea:50,dap:30,mop:25,waterPerAcre:140000,yieldPerAcre:60},
  brinjal:{urea:45,dap:35,mop:22,waterPerAcre:160000,yieldPerAcre:65},
  mango:{urea:30,dap:20,mop:20,waterPerAcre:120000,yieldPerAcre:40},
  banana:{urea:70,dap:35,mop:45,waterPerAcre:250000,yieldPerAcre:150},
};

function cropOptions(){
  return PLANTS.filter(p=>CALC_DATA[p.id]).map(p=>`<option value="${p.id}">${p[lang]}</option>`).join('');
}

function renderCalculators(){
  const wrap = document.getElementById('learnCalc');
  wrap.innerHTML = `
    <div class="calc-box">
      <div class="calc-title">${t('calcFertTitle')}</div>
      <div class="calc-row">
        <select class="calc-select" id="fertCrop"><option value="">${t('selectPlaceholder')}</option>${cropOptions()}</select>
        <input class="calc-input" id="fertArea" type="number" min="0.1" step="0.1" placeholder="${t('calcAreaLabel')}">
      </div>
      <button class="primary-btn" style="width:100%;" onclick="calcFert()">${t('calcFertBtn')}</button>
      <div class="calc-result" id="fertResult" style="display:none;"></div>
    </div>
    <div class="calc-box">
      <div class="calc-title">${t('calcWaterTitle')}</div>
      <div class="calc-row">
        <select class="calc-select" id="waterCrop"><option value="">${t('selectPlaceholder')}</option>${cropOptions()}</select>
        <input class="calc-input" id="waterArea" type="number" min="0.1" step="0.1" placeholder="${t('calcAreaLabel')}">
      </div>
      <button class="primary-btn" style="width:100%;" onclick="calcWater()">${t('calcWaterBtn')}</button>
      <div class="calc-result" id="waterResult" style="display:none;"></div>
    </div>
    <div class="calc-box">
      <div class="calc-title">${t('calcYieldTitle')}</div>
      <div class="calc-row">
        <select class="calc-select" id="yieldCrop"><option value="">${t('selectPlaceholder')}</option>${cropOptions()}</select>
        <input class="calc-input" id="yieldArea" type="number" min="0.1" step="0.1" placeholder="${t('calcAreaLabel')}">
      </div>
      <button class="primary-btn" style="width:100%;" onclick="calcYield()">${t('calcYieldBtn')}</button>
      <div class="calc-result" id="yieldResult" style="display:none;"></div>
    </div>
    <div class="disclaimer">${t('calcDisclaimer')}</div>
  `;
}

function calcFert(){
  const crop = document.getElementById('fertCrop').value;
  const area = parseFloat(document.getElementById('fertArea').value);
  const box = document.getElementById('fertResult');
  if(!crop || !area || area<=0){ box.style.display='block'; box.innerHTML = lang==='hi'?'कृपया फसल और क्षेत्रफल दोनों भरें':'Please fill both crop and area'; return; }
  const d = CALC_DATA[crop];
  box.style.display='block';
  box.innerHTML = t('calcFertResult')(Math.round(d.urea*area), Math.round(d.dap*area), Math.round(d.mop*area));
}
function calcWater(){
  const crop = document.getElementById('waterCrop').value;
  const area = parseFloat(document.getElementById('waterArea').value);
  const box = document.getElementById('waterResult');
  if(!crop || !area || area<=0){ box.style.display='block'; box.innerHTML = lang==='hi'?'कृपया फसल और क्षेत्रफल दोनों भरें':'Please fill both crop and area'; return; }
  const d = CALC_DATA[crop];
  box.style.display='block';
  box.innerHTML = t('calcWaterResult')(Math.round(d.waterPerAcre*area).toLocaleString());
}
function calcYield(){
  const crop = document.getElementById('yieldCrop').value;
  const area = parseFloat(document.getElementById('yieldArea').value);
  const box = document.getElementById('yieldResult');
  if(!crop || !area || area<=0){ box.style.display='block'; box.innerHTML = lang==='hi'?'कृपया फसल और क्षेत्रफल दोनों भरें':'Please fill both crop and area'; return; }
  const d = CALC_DATA[crop];
  box.style.display='block';
  box.innerHTML = t('calcYieldResult')(Math.round(d.yieldPerAcre*area));
}

function setLearnSeg(seg){
  document.querySelectorAll('.segment-btn').forEach(b=>b.classList.toggle('active', b.dataset.seg===seg));

function postQuestion(){
  const input = document.getElementById('askInput');
  const val = input.value.trim();
  if(!val) return;
  QA_POSTS.unshift({
    tagHi: t('postedTag'), tagEn: t('postedTag'),
    qHi: val, qEn: val,
    pending: true,
    author: lang==='hi' ? 'आप' : 'You'
  });
  input.value = '';
  renderQaList();
}

/* ---------------- Disease Detector ---------------- */
const fileInput = document.getElementById('fileInput');
const detectCard = document.getElementById('detectCard');
const resultArea = document.getElementById('detectResultArea');

fileInput.addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = async function(ev){
    const base64Full = ev.target.result;
    const base64Data = base64Full.split(',')[1];
    const mediaType = file.type || 'image/jpeg';

    detectCard.innerHTML = `<img src="${base64Full}" alt="uploaded plant photo">`;
    resultArea.innerHTML = `<div class="result-card"><div class="loading-wrap"><div class="spinner"></div><div class="loading-text">${t('detectLoading')}</div></div></div>`;

    try{
      const langInstruction = lang==='hi'
        ? "Respond with Hindi text in the hi-language fields and English text in the en-language fields."
        : "Respond with English text in both fields, keeping the hi fields also in simple English since the user chose English.";

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: [
              { type: "image", source: { type: "base64", media_type: mediaType, data: base64Data } },
              { type: "text", text: `You are an agriculture expert helping Indian farmers, students and home gardeners. Look at this plant/crop/leaf photo carefully. ${langInstruction} Respond ONLY in raw JSON, no markdown fences, no preamble, with this exact structure: {"plant_name_hi":"...", "plant_name_en":"...", "condition_hi":"...", "condition_en":"...", "symptoms_hi":"...", "treatment_hi":"...", "confidence": a number between 40 and 95}. If the image is unclear or not a plant, set condition fields to indicate that and explain in symptoms fields.` }
            ]
          }]
        })
      });

      const data = await response.json();
      const textBlock = (data.content || []).find(b=>b.type==='text');
      if(!textBlock) throw new Error('No response from AI');

      let clean = textBlock.text.trim().replace(/^```json/,'').replace(/^```/,'').replace(/```$/,'').trim();
      const result = JSON.parse(clean);

      const nameLine = lang==='hi'
        ? `${result.plant_name_hi} <span style="font-size:13px;color:var(--text-soft);font-weight:400;">(${result.plant_name_en})</span>`
        : `${result.plant_name_en}`;

      resultArea.innerHTML = `
        <div class="result-card">
          <div class="rc-title">${nameLine}</div>
          <div class="rc-sub">AI Analysis</div>
          <div class="rc-block">
            <div class="rc-label">Condition</div>
            <div class="rc-text" style="font-weight:600;">${lang==='hi'? result.condition_hi + ' <span style=\"font-weight:400;color:var(--text-soft);\">('+result.condition_en+')</span>' : result.condition_en}</div>
          </div>
          <div class="rc-block">
            <div class="rc-label">${t('symptomLabel')}</div>
            <div class="rc-text">${result.symptoms_hi}</div>
          </div>
          <div class="rc-block">
            <div class="rc-label">${t('fixLabel')}</div>
            <div class="rc-text">${result.treatment_hi}</div>
          </div>
          <div class="rc-block" style="margin-bottom:2px;">
            <div class="rc-label">Confidence</div>
            <div class="confidence-bar"><div class="confidence-fill" style="width:${result.confidence}%;"></div></div>
          </div>
        </div>
      `;
    }catch(err){
      resultArea.innerHTML = `<div class="error-box">${t('detectErrorPrefix')} (${err.message})</div>`;
    }
  };
  reader.readAsDataURL(file);
});

// Only registers when served over http(s) with a real hosted origin (not file://),
// and only if manifest.json / sw.js are present alongside this file.
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.protocol === 'http:')) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {
      // sw.js not found next to this file yet — silently ignore until properly hosted
    });
  });
}
